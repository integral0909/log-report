artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Parsing an Apache common-log-format access log into summary statistics: counting request lines, extracting and de-duplicating client IPs from the first field, and parsing the quoted request line to find the most-requested path."
solution_explanation = "Read /app/access.log line by line. Count non-empty lines for total_requests, collect the first whitespace-separated field into a set for unique_ips, and extract the request path from the quoted request line, tallying counts to find the most frequent path. Write the three values to /app/report.json."
verification_explanation = "The verifier loads /app/report.json and asserts the actual computed values against the fixed seed log: total_requests == 6, unique_ips == 3, and top_path == /index.html. Each assertion maps 1:1 to a numbered success criterion in instruction.md, so doing nothing (no report) or producing wrong counts fails."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
